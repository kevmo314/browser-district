name: Publish osm-district-lookup to npm

# Two ways to fire:
#   1. Push a tag like v0.1.1 — uses the version baked into package.json (must
#      match the tag minus the leading v, otherwise the workflow fails fast).
#   2. workflow_dispatch — runs against package.json's current version, useful
#      if you forgot the tag or want to re-run.
#
# Auth: npm Trusted Publishers + GitHub OIDC. Configure the publisher on
# npmjs.com under Account → Trusted Publishers (or the package's "Settings"
# tab once it exists):
#   Package:  browser-district
#   Repo:     kevmo314/district
#   Workflow: .github/workflows/publish.yml
#   (optional) Ref pattern: refs/tags/v*
# When npm sees a publish from this exact (repo, workflow) running on a
# GitHub-hosted runner with `id-token: write`, it issues a short-lived
# publish token via OIDC — no long-lived NPM_TOKEN secret in this repo.
#
# `publishConfig.provenance: true` in package.json signs the build
# attestation through Sigstore using the same OIDC token.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # If this run was triggered by a tag, make sure the tag and the
      # version in package.json agree before we publish anything.
      - name: Sanity-check tag vs package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($tag) doesn't match package.json version ($pkg)"
            exit 1
          fi

      # Trusted publishing requires npm CLI ≥ 11.5.1. Node 22 ships with
       # npm 10.x, so pull a current npm via npx — avoids the well-known
       # `npm install -g npm@latest` self-upgrade flakiness (MODULE_NOT_FOUND
       # for promise-retry mid-upgrade) by never touching the global install.
      - name: Inspect tarball (dry run)
        run: npx -y npm@latest pack --dry-run

      - name: Publish to npm via Trusted Publisher (OIDC) + provenance
        # No NODE_AUTH_TOKEN — the npm CLI exchanges the GitHub OIDC token for
        # a short-lived publish token because Trusted Publisher is configured
        # on npmjs.com for (browser-district, kevmo314/district, this workflow).
        run: npx -y npm@latest publish
