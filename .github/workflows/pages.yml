name: Deploy demo to GitHub Pages

# Ships only the static demo (index.html + package/) to Pages.
# The data files (.drt + .dn + manifest) are NOT shipped here — they live in
# the R2 bucket `district` and the demo fetches them cross-origin via Range.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "package/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -r package _site/package

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - id: deploy
        uses: actions/deploy-pages@v4
